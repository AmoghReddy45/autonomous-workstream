name: Publish to PyPI

# Publishes to PyPI when you cut a GitHub Release, using PyPI Trusted Publishing
# (OIDC) — no API token or secret is stored anywhere.
#
# ONE-TIME SETUP (only the PyPI account owner can do this):
#   1. Create a PyPI account and verify your email.
#   2. PyPI → Your projects → Publishing → "Add a pending publisher":
#        PyPI project name : autonomous-workstream
#        Owner             : AmoghReddy45
#        Repository name   : autonomous-workstream
#        Workflow name     : publish.yml
#        Environment name  : (leave blank)
#   3. Push a tag + create a GitHub Release (e.g. v0.1.0). This workflow runs and
#      publishes automatically.
#
# Alternative (no workflow): build locally and `python -m twine upload dist/*`
# with a PyPI API token.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
